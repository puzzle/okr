<form class="d-flex search-form">
  <mat-form-field
    id="search-member-form-field"
    class="bg-white header-form-field"
    ngDefaultControl
    subscriptSizing="dynamic"
    appearance="outline"
  >
    <input
      type="text"
      [placeholder]="'TEAM_MANAGEMENT.INPUT_PLACEHOLDER' | translate"
      matInput
      [formControl]="search"
      [matAutocomplete]="auto"
      [attr.data-testId]="'teamManagementSearch'"
    />
    <mat-autocomplete
      #auto="matAutocomplete"
      class="autocomplete-bigger"
      [attr.data-testId]="'teamManagementSearchResult'"
      [autoActiveFirstOption]="true"
    >
      @if ((filteredUsers$ | async)?.length) {
      <mat-optgroup [label]="'TEAM_MANAGEMENT.USERS' | translate">
        @for (user of filteredUsers$ | async; track user) {
        <mat-option (onSelectionChange)="selectUser(user)">
          <span [innerHtml]="user.htmlValue"></span>
        </mat-option>
        }
      </mat-optgroup>
      }
      @if ((filteredTeams$ | async)?.length) {
      <mat-optgroup [label]="'TEAM_MANAGEMENT.TEAMS' | translate">
        @for (team of filteredTeams$ | async; track team) {
        <mat-option (onSelectionChange)="selectTeam(team)">
          <span [innerHtml]="team.htmlValue"></span>
        </mat-option>
        }
      </mat-optgroup>
      }
    </mat-autocomplete>
  </mat-form-field>
  <button class="bg-pz-dark-blue d-flex justify-content-center align-items-center icon-button px-3 focus-outline" type="submit">
    <mat-icon
      aria-hidden="false"
      aria-label="Search Icon"
      fontIcon="search"
      class="text-white"
    ></mat-icon>
  </button>
</form>
