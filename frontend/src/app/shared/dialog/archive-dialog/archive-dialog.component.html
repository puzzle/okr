<app-dialog-template-core [title]="'Team Archivieren'">
  <ng-container content>
    <div class="dialog-content">
      <div class="col">
        <div class="okr-form-row okr-form-label-input-container">
          <label class="okr-form-label okr-form-col" for="archiveQuarter">
            Ab wann soll das Team als Archiviert zählen?
          </label>

          <div class="okr-form-input pe-5">
            <select
              class="custom-select bg-white"
              id="archiveQuarter"
              [(ngModel)]="selectedQuarter"
              [compareWith]="compareById"
              [attr.data-testId]="'archiveQuarterSelect'"
            >
              @for (quarter of availableQuarters$ | async; track quarter.id) {
              <option [ngValue]="quarter">
                {{ quarter.fullLabel() }}
              </option>
              }
            </select>
          </div>
        </div>
      </div>
    </div>
  </ng-container>

  <ng-container actions>
    <div class="col-auto">
      <button
        [attr.data-testId]="'save-btn'"
        type="button"
        (click)="onSave()"
        color="primary"
        mat-flat-button
        [disabled]="!selectedQuarter"
      >
        Speichern
      </button>

      <button
        mat-button
        mat-dialog-close
        color="primary"
        [attr.data-testId]="'cancel-btn'"
      >
        Abbrechen
      </button>
    </div>
  </ng-container>
</app-dialog-template-core>
