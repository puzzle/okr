<div class="role">
  @if (!edit) {
  <span>{{ getRole() }}</span>

  @if (isWriteable()) {
  <span
    [matTooltip]="isArchived() ? 'Rolle kann nicht bearbeitet werden, da das Team archiviert ist.' : ''"
    [matTooltipDisabled]="!isArchived()"
    style="display: inline-block;"
  >
    <app-puzzle-icon-button
      (click)="isArchived() ? $event.stopPropagation() : setEditAsync($event, true)"
      [disabled]="isArchived()"
      [attr.data-testId]="'edit-role'"
      icon="edit.svg"
      alt="Edit Team Icon"
    >
    </app-puzzle-icon-button>
  </span>
  }
  }

  @if (edit) {
  <app-team-role-dropdown
    [isAdmin]="userTeam().isTeamAdmin"
    (isAdminChange)="saveIsAdmin($event)">
  </app-team-role-dropdown>
  }
</div>
