<div mat-dialog-title>
  <div class="container-fluid">
    <div class="row">
      <h2 class="col d-flex justify-content-between align-items-center my-2">
        {{ title }}
        <button
          mat-dialog-close
          mat-icon-button
          [attr.data-testId]="'close-dialog'"
        >
          <mat-icon class="text-secondary">close</mat-icon>
        </button>
      </h2>
    </div>
  </div>
</div>

<mat-divider class="mx-4"></mat-divider>

<mat-dialog-content class="text-black">
  @if (isValueReady(observable | async)) {
  <div class="container-fluid">
    <ng-content select="[content]"></ng-content>
  </div>
  } @else {
  <app-spinner [text]="title + ' wird geladen...'"></app-spinner>
  }
</mat-dialog-content>

<mat-divider></mat-divider>

<mat-dialog-actions>
  <div class="container-fluid">
    <div class="row justify-content-between">
      <ng-content select="[actions]"></ng-content>
    </div>
  </div>
</mat-dialog-actions>
